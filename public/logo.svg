<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hull -->
  <path d="M12 42 L16 50 Q32 54 48 50 L52 42 Z" fill="#1e3a5f"/>

  <!-- Hull highlight -->

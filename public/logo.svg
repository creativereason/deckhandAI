  <!-- Water line — subtle waves -->
  <path d="M6 43 Q13 40.5 20 43 Q27 45.5 34 43 Q41 40.5 48 43 Q54 44.5 58 43" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
